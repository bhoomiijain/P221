# fly.toml app configuration generated for P221
app = "p221-pharmacy"
primary_region = "lax"

[build]
dockerfile = "Dockerfile"

[env]
APP_ENV = "production"
APP_DEBUG = "false"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[services]]
protocol = "tcp"
internal_port = 8000
ports = [{ port = 443, handlers = ["tls"], force_https = true }, { port = 80, handlers = ["http"] }]

[checks]
  [checks.status]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"
    type = "http"
